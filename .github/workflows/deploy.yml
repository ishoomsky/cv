name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; newer pushes cancel in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # npm install (not ci) tolerates lockfiles generated by a different
      # npm/OS — npm ci was failing on the runner's stricter verification.
      - run: npm install --no-audit --no-fund

      # Served from https://ishoomsky.github.io/cv/ → base-href must be /cv/.
      - run: npm run build -- --base-href=/cv/

      - name: SPA fallback + disable Jekyll
        run: |
          cp dist/cv/browser/index.html dist/cv/browser/404.html
          touch dist/cv/browser/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/cv/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
