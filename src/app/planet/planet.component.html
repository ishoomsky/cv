<canvas id="planetCanvas"></canvas>
<svg id="jupiterSVG" xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300"
  style="display: none;">
  <defs>
    <radialGradient id="atmosphereGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(230, 180, 130, 0.8)" />
      <stop offset="100%" stop-color="rgba(0, 0, 0, 0)" />
    </radialGradient>
    <clipPath id="circleClip">
      <circle cx="150" cy="150" r="100" />
    </clipPath>
    <radialGradient id="shading" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.6)" />
      <stop offset="50%" stop-color="rgba(0, 0, 0, 0)" />
      <stop offset="100%" stop-color="rgba(0, 0, 0, 0.4)" />
    </radialGradient>
  </defs>

  <g clip-path="url(#circleClip)">
    <rect x="50" y="50" width="200" height="200" fill="#d39c7e" />
    <!-- Bands -->
    <path d="M50 70 Q 150 90 250 70 L 250 100 Q 150 120 50 100 Z" fill="#c88b3a" />
    <path d="M50 120 Q 150 140 250 120 L 250 150 Q 150 170 50 150 Z" fill="#a56c3f" />
    <path d="M50 160 Q 150 180 250 160 L 250 190 Q 150 210 50 190 Z" fill="#e3b185" />
    <path d="M50 200 Q 150 220 250 200 L 250 220 Q 150 240 50 220 Z" fill="#995e34" />
    <path d="M50 230 Q 150 245 250 230 L 250 250 Q 150 260 50 250 Z" fill="#b98256" />
    <!-- Great Red Spot -->
    <ellipse cx="180" cy="165" rx="25" ry="12" fill="#9e3c27" opacity="0.8" />
    <ellipse cx="180" cy="165" rx="15" ry="5" fill="#c35639" opacity="0.7" />
  </g>

  <!-- Add spherical 3D shading on top -->
  <circle cx="150" cy="150" r="100" fill="url(#shading)" />
</svg>
