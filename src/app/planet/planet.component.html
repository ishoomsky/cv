<canvas id="planetCanvas"></canvas>
<svg id="earthSVG" xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300"
  style="display: none;">
  <defs>
    <clipPath id="circleClip">
      <circle cx="150" cy="150" r="100" />
    </clipPath>
    <radialGradient id="oceanGrad" cx="36%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#2e8fcc" />
      <stop offset="50%" stop-color="#0e4880" />
      <stop offset="100%" stop-color="#041a3a" />
    </radialGradient>
    <radialGradient id="shading" cx="30%" cy="26%" r="70%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.0)" />
      <stop offset="40%" stop-color="rgba(0,0,0,0)" />
      <stop offset="100%" stop-color="rgba(0,0,30,0.72)" />
    </radialGradient>
    <radialGradient id="highlight" cx="30%" cy="26%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </radialGradient>
    <radialGradient id="atmRim" cx="50%" cy="50%" r="50%">
      <stop offset="86%" stop-color="rgba(0,0,0,0)" />
      <stop offset="100%" stop-color="rgba(80,180,255,0.18)" />
    </radialGradient>
    <filter id="landBlur">
      <feGaussianBlur stdDeviation="0.6" />
    </filter>
  </defs>

  <g clip-path="url(#circleClip)">
    <!-- Ocean base -->
    <rect x="50" y="50" width="200" height="200" fill="url(#oceanGrad)" />

    <!-- Landmasses with slight blur for organic look -->
    <g filter="url(#landBlur)">
      <!-- North America -->
      <path d="M72 86 C78 78 90 74 104 80 C114 85 120 96 122 112
               C124 126 118 136 110 138 C98 140 86 132 78 120
               C70 108 68 96 72 86 Z" fill="#4a7c3f" />
      <!-- Alaska bump -->
      <path d="M66 88 C70 82 76 80 80 85 C78 92 70 94 66 88 Z" fill="#4a7c3f" />
      <!-- Florida peninsula -->
      <path d="M106 138 C110 140 114 148 112 154 C109 158 104 156 102 150 C100 144 103 139 106 138 Z" fill="#5a8845" />
      <!-- Greenland -->
      <path d="M112 60 C122 54 136 56 140 66 C142 74 136 82 124 82 C112 82 106 72 112 60 Z" fill="#d8eaf2" />
      <!-- South America -->
      <path d="M96 142 C104 135 118 134 126 146 C132 156 130 172 124 184
               C118 194 108 196 98 190 C88 183 84 168 84 154 C84 148 90 146 96 142 Z" fill="#5c8a45" />

      <!-- Europe -->
      <path d="M148 76 C156 70 170 70 175 80 C179 88 174 98 164 100
               C154 102 144 95 144 86 C144 82 146 78 148 76 Z" fill="#6a8c50" />
      <!-- Scandinavian bump -->
      <path d="M164 68 C170 62 178 64 180 72 C178 78 172 80 166 76 Z" fill="#6a8c50" />
      <!-- British Isles -->
      <path d="M142 74 C146 70 150 72 150 76 C150 80 146 82 142 80 C140 78 140 76 142 74 Z" fill="#6a8c50" />

      <!-- Africa -->
      <path d="M148 96 C162 92 178 94 184 108 C188 118 188 134 184 150
               C180 164 172 174 160 178 C148 180 138 172 134 158
               C130 144 132 124 136 110 C138 102 144 98 148 96 Z" fill="#8c7c3e" />
      <!-- Madagascar -->
      <path d="M192 152 C196 148 202 150 204 158 C204 164 200 168 196 166
               C192 164 190 158 192 152 Z" fill="#8c7c3e" />

      <!-- Asia -->
      <path d="M172 66 C190 60 220 62 240 76 C248 84 246 100 238 112
               C228 124 210 130 192 126 C176 122 164 112 162 98
               C160 84 166 70 172 66 Z" fill="#6c8652" />
      <!-- Southeast Asia peninsula -->
      <path d="M228 120 C236 116 244 120 246 130 C246 140 240 148 232 148
               C224 148 220 140 222 132 C222 126 226 122 228 120 Z" fill="#6c8652" />
      <!-- Indian subcontinent -->
      <path d="M190 122 C200 118 212 122 216 132 C220 144 216 158 208 164
               C200 168 190 164 186 154 C182 144 184 130 190 122 Z" fill="#7c8e4a" />

      <!-- Japan -->
      <path d="M240 84 C244 80 250 82 252 88 C252 94 248 98 244 96 C240 94 238 88 240 84 Z" fill="#6c8652" />

      <!-- Australia -->
      <path d="M210 160 C224 154 238 156 244 166 C248 174 246 186 236 192
               C226 196 212 192 206 182 C202 172 204 164 210 160 Z" fill="#9e8a4a" />
    </g>

    <!-- Ice caps -->
    <path d="M88 56 Q150 46 212 56 C218 62 214 70 206 72 Q150 62 94 72 C86 70 82 62 88 56 Z"
          fill="#e8f4fc" opacity="0.9" />
    <path d="M72 232 Q150 220 228 232 L234 250 L66 250 Z"
          fill="#e8f4fc" opacity="0.88" />

    <!-- Clouds - wispy and semi-transparent -->
    <g opacity="0.45">
      <ellipse cx="106" cy="100" rx="18" ry="5" fill="white" />
      <ellipse cx="118" cy="98" rx="14" ry="4" fill="white" />
      <ellipse cx="98" cy="103" rx="10" ry="3" fill="white" />

      <ellipse cx="198" cy="142" rx="16" ry="4" fill="white" />
      <ellipse cx="212" cy="140" rx="11" ry="3" fill="white" />

      <ellipse cx="138" cy="174" rx="18" ry="4" fill="white" />
      <ellipse cx="152" cy="172" rx="12" ry="3" fill="white" />

      <ellipse cx="76" cy="150" rx="13" ry="3" fill="white" />

      <ellipse cx="228" cy="90" rx="10" ry="3" fill="white" />
      <ellipse cx="162" cy="116" rx="11" ry="3" fill="white" />

      <ellipse cx="174" cy="92" rx="9" ry="3" fill="white" />
      <ellipse cx="122" cy="128" rx="10" ry="3" fill="white" />
    </g>
  </g>

  <!-- 3D dark-side shading -->
  <circle cx="150" cy="150" r="100" fill="url(#shading)" clip-path="url(#circleClip)" />
  <!-- Specular highlight -->
  <circle cx="150" cy="150" r="100" fill="url(#highlight)" clip-path="url(#circleClip)" />
  <!-- Atmosphere rim glow -->
  <circle cx="150" cy="150" r="100" fill="url(#atmRim)" clip-path="url(#circleClip)" />
</svg>
