    <div class="section">
      <div class="section-label"><span class="diamond">◈</span> NAVIGATION</div>

        <button class="nav-item featured" (click)="openCv()">

    <div class="divider"></div>

    <div class="modal" (click)="$event.stopPropagation()">
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>
      <div class="modal-head">
        <span class="modal-title">◈ CURRICULUM VITAE // IVAN.SHUMSKI</span>
        <button class="close-btn" (click)="closeCv()">✕ CLOSE</button>
      </div>
      <div class="modal-body">
        <iframe [src]="cvUrl" title="CV Ivan Shumski"></iframe>
      </div>
    </div>
  </div>
}
