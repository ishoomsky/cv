<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#02101f"/><stop offset=".55" stop-color="#010a16"/><stop offset="1" stop-color="#01060f"/>
    </linearGradient>
    <radialGradient id="glow" cx="60%" cy="24%" r="64%">
      <stop offset="0" stop-color="#00d4ff" stop-opacity=".24"/><stop offset=".45" stop-color="#0a6fa0" stop-opacity=".08"/><stop offset="1" stop-color="#010a16" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="scrim" x1="0" y1="1" x2=".55" y2=".25">
      <stop offset="0" stop-color="#01060f" stop-opacity=".62"/><stop offset="1" stop-color="#01060f" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00d4ff" stop-opacity=".28"/><stop offset="1" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" width="48" height="48" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.6" fill="#0d3b55" fill-opacity=".55"/></pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#dots)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>

  <!-- bokeh depth -->
  <g fill="#00d4ff">
    <circle cx="1700" cy="820" r="90" fill-opacity=".05"/>
    <circle cx="1500" cy="900" r="54" fill-opacity=".06"/>
    <circle cx="1820" cy="640" r="70" fill-opacity=".04"/>
    <circle cx="1610" cy="200" r="46" fill-opacity=".05"/>
    <circle cx="880" cy="840" r="40" fill-opacity=".04"/>
  </g>

  <!-- monitor stand -->
  <rect x="1330" y="700" width="42" height="72" fill="#00d4ff" fill-opacity=".08" stroke="#00d4ff" stroke-opacity=".35" stroke-width="2"/>
  <ellipse cx="1351" cy="782" rx="118" ry="18" fill="#00d4ff" fill-opacity=".06" stroke="#00d4ff" stroke-opacity=".35" stroke-width="2"/>

  <!-- ultrawide monitor -->
  <g>
    <rect x="980" y="330" width="742" height="374" rx="14" fill="#00d4ff" fill-opacity=".05" stroke="#00d4ff" stroke-opacity=".55" stroke-width="2"/>
    <path d="M980,374 h742" stroke="#00d4ff" stroke-opacity=".28" stroke-width="1.5"/>
    <g fill="#00d4ff" fill-opacity=".5"><circle cx="1006" cy="352" r="4.5"/><circle cx="1024" cy="352" r="4.5"/></g>
    <!-- KPI row -->
    <g fill="#00d4ff" fill-opacity=".07" stroke="#00d4ff" stroke-opacity=".28"><rect x="1006" y="392" width="120" height="46" rx="6"/><rect x="1140" y="392" width="120" height="46" rx="6"/></g>
    <g fill="#00d4ff" fill-opacity=".45"><rect x="1020" y="405" width="66" height="8" rx="4"/><rect x="1154" y="405" width="66" height="8" rx="4"/></g>
    <!-- area/line chart (left, main) -->
    <g transform="translate(1006,460)">
      <path d="M0,190 L0,150 L70,110 L140,128 L210,66 L280,92 L350,40 L350,190 Z" fill="url(#area)"/>
      <polyline points="0,150 70,110 140,128 210,66 280,92 350,40" fill="none" stroke="#00d4ff" stroke-width="2.6"/>
      <circle cx="350" cy="40" r="5.5" fill="#00d4ff"/>
    </g>
    <!-- right tile grid -->
    <g transform="translate(1400,458)" fill="#00d4ff" fill-opacity=".06" stroke="#00d4ff" stroke-opacity=".28">
      <rect x="0" y="0" width="140" height="66" rx="6"/><rect x="156" y="0" width="140" height="66" rx="6"/>
      <rect x="0" y="82" width="140" height="66" rx="6"/><rect x="156" y="82" width="140" height="66" rx="6"/>
    </g>
    <g transform="translate(1400,458)" fill="none" stroke="#22c55e" stroke-opacity=".6" stroke-width="2">
      <polyline points="14,50 46,34 78,42 110,20"/>
    </g>
  </g>

  <g fill="#00d4ff" fill-opacity=".5"><circle cx="900" cy="250" r="2.2"/><circle cx="1760" cy="300" r="2"/><circle cx="1840" cy="420" r="1.8"/></g>

  <rect width="1920" height="1080" fill="url(#scrim)"/>
</svg>
