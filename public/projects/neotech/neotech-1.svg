<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#02101f"/><stop offset=".55" stop-color="#010a16"/><stop offset="1" stop-color="#01060f"/>
    </linearGradient>
    <radialGradient id="glow" cx="66%" cy="26%" r="62%">
      <stop offset="0" stop-color="#00d4ff" stop-opacity=".24"/><stop offset=".45" stop-color="#0a6fa0" stop-opacity=".08"/><stop offset="1" stop-color="#010a16" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="scrim" x1="0" y1="1" x2=".55" y2=".25">
      <stop offset="0" stop-color="#01060f" stop-opacity=".62"/><stop offset="1" stop-color="#01060f" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" width="48" height="48" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.6" fill="#0d3b55" fill-opacity=".55"/></pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#dots)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>

  <!-- sync links between devices -->
  <g stroke="#00d4ff" stroke-opacity=".35" stroke-width="1.5" fill="none" stroke-dasharray="2 8" stroke-linecap="round">
    <path d="M1090,640 C1000,640 980,600 1030,560"/>
    <path d="M1590,520 C1680,520 1700,560 1650,590"/>
  </g>

  <!-- tablet (behind, right) -->
  <g>
    <rect x="1600" y="430" width="240" height="330" rx="16" fill="#00d4ff" fill-opacity=".04" stroke="#00d4ff" stroke-opacity=".4" stroke-width="2"/>
    <rect x="1622" y="458" width="196" height="40" rx="6" fill="#00d4ff" fill-opacity=".07"/>
    <rect x="1622" y="512" width="92" height="70" rx="6" fill="#00d4ff" fill-opacity=".05" stroke="#00d4ff" stroke-opacity=".25"/>
    <rect x="1726" y="512" width="92" height="70" rx="6" fill="#00d4ff" fill-opacity=".05" stroke="#00d4ff" stroke-opacity=".25"/>
    <polyline points="1626,720 1660,690 1694,706 1728,660 1762,678 1810,632" fill="none" stroke="#00d4ff" stroke-opacity=".55" stroke-width="2"/>
  </g>

  <!-- laptop (main) -->
  <g>
    <rect x="1120" y="350" width="472" height="300" rx="12" fill="#00d4ff" fill-opacity=".05" stroke="#00d4ff" stroke-opacity=".55" stroke-width="2"/>
    <path d="M1092,650 H1620 L1662,684 H1050 Z" fill="#00d4ff" fill-opacity=".06" stroke="#00d4ff" stroke-opacity=".4" stroke-width="2"/>
    <!-- KPI tiles -->
    <g fill="#00d4ff" fill-opacity=".07" stroke="#00d4ff" stroke-opacity=".3">
      <rect x="1146" y="378" width="126" height="58" rx="6"/><rect x="1288" y="378" width="126" height="58" rx="6"/><rect x="1430" y="378" width="126" height="58" rx="6"/>
    </g>
    <g fill="#00d4ff" fill-opacity=".5"><rect x="1160" y="394" width="60" height="7" rx="3"/><rect x="1302" y="394" width="60" height="7" rx="3"/><rect x="1444" y="394" width="60" height="7" rx="3"/></g>
    <g fill="#00d4ff" fill-opacity=".28"><rect x="1160" y="412" width="94" height="10" rx="4"/><rect x="1302" y="412" width="94" height="10" rx="4"/><rect x="1444" y="412" width="94" height="10" rx="4"/></g>
    <!-- bar chart -->
    <g transform="translate(1150,470)">
      <g fill="#00d4ff" fill-opacity=".18" stroke="#00d4ff" stroke-opacity=".45">
        <rect x="0" y="72" width="22" height="66" rx="3"/><rect x="34" y="44" width="22" height="94" rx="3"/><rect x="68" y="88" width="22" height="50" rx="3"/><rect x="102" y="24" width="22" height="114" rx="3"/><rect x="136" y="58" width="22" height="80" rx="3"/>
      </g>
    </g>
    <!-- line chart -->
    <g transform="translate(1360,470)">
      <polyline points="0,120 46,90 92,104 138,58 184,74 214,30" fill="none" stroke="#22c55e" stroke-opacity=".7" stroke-width="2.5"/>
      <circle cx="214" cy="30" r="5" fill="#22c55e" fill-opacity=".7"/>
    </g>
  </g>

  <!-- phone (front) -->
  <g>
    <rect x="1000" y="470" width="150" height="300" rx="22" fill="#02121f" stroke="#00d4ff" stroke-opacity=".6" stroke-width="2"/>
    <rect x="1050" y="484" width="50" height="8" rx="4" fill="#00d4ff" fill-opacity=".4"/>
    <rect x="1018" y="508" width="114" height="52" rx="8" fill="#00d4ff" fill-opacity=".08" stroke="#00d4ff" stroke-opacity=".3"/>
    <circle cx="1075" cy="626" r="34" fill="none" stroke="#00d4ff" stroke-opacity=".25" stroke-width="9"/>
    <circle cx="1075" cy="626" r="34" fill="none" stroke="#00d4ff" stroke-opacity=".8" stroke-width="9" stroke-dasharray="120 214" stroke-linecap="round" transform="rotate(-90 1075 626)"/>
    <rect x="1018" y="704" width="114" height="12" rx="6" fill="#00d4ff" fill-opacity=".22"/>
    <rect x="1018" y="726" width="80" height="12" rx="6" fill="#00d4ff" fill-opacity=".22"/>
  </g>

  <!-- sync nodes -->
  <g fill="#00d4ff"><circle cx="1030" cy="560" r="5"/><circle cx="1650" cy="590" r="5"/><circle cx="1090" cy="640" r="4" fill-opacity=".7"/></g>

  <g fill="#00d4ff" fill-opacity=".5"><circle cx="1720" cy="230" r="2.4"/><circle cx="1810" cy="320" r="2"/><circle cx="1640" cy="180" r="1.8"/><circle cx="1560" cy="250" r="1.6"/></g>

  <rect width="1920" height="1080" fill="url(#scrim)"/>
</svg>
