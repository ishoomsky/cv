<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#02101f"/><stop offset=".55" stop-color="#010a16"/><stop offset="1" stop-color="#01060f"/>
    </linearGradient>
    <radialGradient id="glow" cx="64%" cy="24%" r="62%">
      <stop offset="0" stop-color="#00a8e8" stop-opacity=".22"/><stop offset=".45" stop-color="#0a6fa0" stop-opacity=".08"/><stop offset="1" stop-color="#010a16" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="scrim" x1="0" y1="1" x2=".55" y2=".25">
      <stop offset="0" stop-color="#01060f" stop-opacity=".62"/><stop offset="1" stop-color="#01060f" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" width="48" height="48" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.6" fill="#0d3b55" fill-opacity=".55"/></pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#dots)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>

  <!-- header strip -->
  <g>
    <rect x="1120" y="196" width="532" height="34" rx="6" fill="#00d4ff" fill-opacity=".06" stroke="#00d4ff" stroke-opacity=".3"/>
    <rect x="1136" y="207" width="120" height="12" rx="6" fill="#00d4ff" fill-opacity=".5"/>
    <g fill="#00d4ff" fill-opacity=".3"><rect x="1560" y="207" width="18" height="12" rx="3"/><rect x="1586" y="207" width="18" height="12" rx="3"/><rect x="1612" y="207" width="18" height="12" rx="3"/></g>
  </g>

  <!-- card kit: 2 cols x 3 rows -->
  <g font-family="monospace">
    <!-- card frame helper repeated inline -->
    <!-- (0,0) donut -->
    <g transform="translate(1120,246)">
      <rect width="254" height="180" rx="8" fill="#00d4ff" fill-opacity=".045" stroke="#00d4ff" stroke-opacity=".35" stroke-width="1.5"/>
      <rect x="18" y="18" width="96" height="9" rx="4" fill="#00d4ff" fill-opacity=".45"/>
      <circle cx="78" cy="112" r="40" fill="none" stroke="#00d4ff" stroke-opacity=".2" stroke-width="14"/>
      <circle cx="78" cy="112" r="40" fill="none" stroke="#00d4ff" stroke-opacity=".8" stroke-width="14" stroke-dasharray="150 251" stroke-linecap="round" transform="rotate(-90 78 112)"/>
      <g fill="#00d4ff" fill-opacity=".3"><rect x="150" y="86" width="76" height="10" rx="5"/><rect x="150" y="108" width="60" height="10" rx="5"/><rect x="150" y="130" width="68" height="10" rx="5"/></g>
    </g>
    <!-- (1,0) bars -->
    <g transform="translate(1398,246)">
      <rect width="254" height="180" rx="8" fill="#00d4ff" fill-opacity=".045" stroke="#00d4ff" stroke-opacity=".35" stroke-width="1.5"/>
      <rect x="18" y="18" width="80" height="9" rx="4" fill="#00d4ff" fill-opacity=".45"/>
      <g fill="#00d4ff" fill-opacity=".2" stroke="#00d4ff" stroke-opacity=".5">
        <rect x="26" y="96" width="26" height="56" rx="3"/><rect x="66" y="70" width="26" height="82" rx="3"/><rect x="106" y="108" width="26" height="44" rx="3"/><rect x="146" y="54" width="26" height="98" rx="3"/><rect x="186" y="84" width="26" height="68" rx="3"/>
      </g>
    </g>
    <!-- (0,1) line/area -->
    <g transform="translate(1120,452)">
      <rect width="254" height="180" rx="8" fill="#00d4ff" fill-opacity=".045" stroke="#00d4ff" stroke-opacity=".35" stroke-width="1.5"/>
      <rect x="18" y="18" width="70" height="9" rx="4" fill="#00d4ff" fill-opacity=".45"/>
      <polyline points="26,140 66,110 106,124 146,78 186,96 226,58" fill="none" stroke="#00d4ff" stroke-width="2.4"/>
      <circle cx="226" cy="58" r="5" fill="#00d4ff"/>
    </g>
    <!-- (1,1) KPI + sparkline -->
    <g transform="translate(1398,452)">
      <rect width="254" height="180" rx="8" fill="#00d4ff" fill-opacity=".045" stroke="#00d4ff" stroke-opacity=".35" stroke-width="1.5"/>
      <rect x="18" y="18" width="90" height="9" rx="4" fill="#00d4ff" fill-opacity=".45"/>
      <rect x="20" y="54" width="120" height="24" rx="5" fill="#00d4ff" fill-opacity=".4"/>
      <rect x="20" y="88" width="70" height="12" rx="6" fill="#22c55e" fill-opacity=".55"/>
      <polyline points="20,150 60,132 100,140 140,118 180,128 226,104" fill="none" stroke="#22c55e" stroke-opacity=".6" stroke-width="2"/>
    </g>
    <!-- (0,2) hbars -->
    <g transform="translate(1120,658)">
      <rect width="254" height="180" rx="8" fill="#00d4ff" fill-opacity=".045" stroke="#00d4ff" stroke-opacity=".35" stroke-width="1.5"/>
      <rect x="18" y="18" width="86" height="9" rx="4" fill="#00d4ff" fill-opacity=".45"/>
      <g fill="#00d4ff" fill-opacity=".25"><rect x="20" y="58" width="200" height="16" rx="8"/><rect x="20" y="92" width="150" height="16" rx="8"/><rect x="20" y="126" width="176" height="16" rx="8"/></g>
      <g fill="#00d4ff" fill-opacity=".8"><rect x="20" y="58" width="120" height="16" rx="8"/><rect x="20" y="92" width="88" height="16" rx="8"/><rect x="20" y="126" width="140" height="16" rx="8"/></g>
    </g>
    <!-- (1,2) gauge -->
    <g transform="translate(1398,658)">
      <rect width="254" height="180" rx="8" fill="#00d4ff" fill-opacity=".045" stroke="#00d4ff" stroke-opacity=".35" stroke-width="1.5"/>
      <rect x="18" y="18" width="76" height="9" rx="4" fill="#00d4ff" fill-opacity=".45"/>
      <path d="M46,140 A82,82 0 0 1 208,140" fill="none" stroke="#00d4ff" stroke-opacity=".2" stroke-width="14" stroke-linecap="round"/>
      <path d="M46,140 A82,82 0 0 1 168,74" fill="none" stroke="#00d4ff" stroke-opacity=".8" stroke-width="14" stroke-linecap="round"/>
      <circle cx="127" cy="140" r="6" fill="#00d4ff"/>
    </g>
  </g>

  <g fill="#00d4ff" fill-opacity=".5"><circle cx="1720" cy="250" r="2.2"/><circle cx="1800" cy="360" r="2"/><circle cx="1680" cy="820" r="2"/></g>

  <rect width="1920" height="1080" fill="url(#scrim)"/>
</svg>
